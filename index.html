<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ISOMon Go</title>

<style>
body {
    font-family: monospace;
    background: #a8d5a2;
    text-align: center;
}

.battle {
    display: flex;
    justify-content: space-around;
    margin: 20px;
}

.pokemon {
    width: 200px;
}

.hp-bar {
    height: 20px;
    background: green;
    margin: 10px 0;
}

#question-box {
    background: #ddd;
    padding: 20px;
    margin: 20px;
    border: 3px solid black;
}

button {
    margin: 5px;
    padding: 10px;
    cursor: pointer;
}

#timer {
    font-size: 30px;
    color: red;
}
</style>
</head>

<body>

<h1>ISOMon Go</h1>

<!-- ✅ BOUTON START (MANQUANT AVANT) -->
<button id="startBtn">Démarrer</button>

<!-- ✅ DIALOGUE -->
<div id="dialogue">Clique sur démarrer</div>

<div class="battle">

    <div class="pokemon">
        <h2>ISOKu</h2>
        <div id="enemyHP" class="hp-bar"></div>
        <img id="enemySprite" src="./assets/isoku.png" width="100">
    </div>

    <div class="pokemon">
        <h2 id="playerName">RSSIlet</h2>
        <div id="playerHP" class="hp-bar"></div>
        <img id="playerSprite" src="./assets/rssilet.png" width="100">
    </div>

</div>

<div id="timer">40</div>

<div id="question-box">
    <p id="question">Chargement...</p>
    <div id="answers"></div>
</div>

<!-- 🎯 Pokeball -->
<img id="pokeball" src="./assets/pokeball.png"
     style="display:none; width:50px; position:absolute; left:50%; top:50%;">

<script src="game.js"></script>

</body>
</html>
