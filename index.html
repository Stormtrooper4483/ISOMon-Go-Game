<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ISOMon Go</title>
    <style>
        body {
            font-family: monospace;
            background: #a8d5a2;
            text-align: center;
        }

        .battle {
            display: flex;
            justify-content: space-around;
            margin: 20px;
        }

        .pokemon {
            width: 200px;
        }

        .hp-bar {
            height: 20px;
            background: green;
            margin: 10px 0;
        }

        #question-box {
            background: #ddd;
            padding: 20px;
            margin: 20px;
            border: 3px solid black;
        }

        button {
            margin: 5px;
            padding: 10px;
            cursor: pointer;
        }

        #timer {
            font-size: 30px;
            color: red;
        }
    </style>
</head>
<body>

<h1>ISOMon Go</h1>
<p>Réponds correctement aux questions ISO 27001 pour attaquer ISOKu !</p>

<div class="battle">
    <div class="pokemon">
        <h2>ISOKu</h2>
        <div id="enemy-hp" class="hp-bar"></div>
        <img src="./assets/isoku.png" width="100">
    </div>

    <div class="pokemon">
        <h2 id="player-name">RSSIlet</h2>
        <div id="player-hp" class="hp-bar"></div>
        <img id="player-img" src="./assets/rssilet.png" width="100">
    </div>
</div>

<div id="timer">40</div>

<div id="question-box">
    <p id="question">Chargement...</p>
    <div id="answers"></div>
</div>

<script src="game.js"></script>

</body>
</html>
