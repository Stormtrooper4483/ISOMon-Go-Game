<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISOMon GO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">
  <div class="gamebox" id="capture-area">

    <div class="title">ISOMon - GO : gagnez l'ISO 27001 !</div>

    <div class="status-bar">
      <div id="round">Round 1</div>
      <div id="timer">⏱️ 40</div>
    </div>

    <!-- COMBAT -->
    <div class="battle-zone">

      <!-- ENNEMI -->
      <div class="enemy-block">
        <div class="enemy-hud">
          ISOKU ♂ Lv3
          <div class="hp-bar">
            PV <progress id="enemy-hp-bar" value="100" max="100"></progress>
          </div>
        </div>
        <img id="enemy-img" src="assets/isoku.png" class="enemy-sprite">
      </div>

      <!-- JOUEUR -->
      <div class="player-block">
        <img id="player-img" src="assets/rssilet_back.png" class="player-sprite">

        <div class="player-hud">
          RSSIlet ♂ Lv1
          <div class="hp-bar">
            PV <progress id="player-hp-bar" value="100" max="100"></progress>
          </div>
          <div id="player-hp">100</div>
        </div>
      </div>

    </div>

    <!-- TEXTE -->
    <div class="question-container">
      <div id="question"></div>
      <div id="answers"></div>
      <div id="explanation"></div>
    </div>

    <!-- BOUTONS -->
    <div class="buttons">
      <button id="start-btn">Démarrer</button>
      <button id="restart-btn" class="hidden">Rejouer</button>
    </div>

    <!-- RESULT -->
    <div id="result-screen" class="hidden result-screen">
      <h2>🎯 Certification ISO 27001 obtenue !</h2>
      <div class="badge">🛡️ ISO CERTIFIED 🛡️</div>
      <div id="final-score"></div>
      <button onclick="downloadImage()">📸 Télécharger</button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="game.js"></script>
</body>
</html>
