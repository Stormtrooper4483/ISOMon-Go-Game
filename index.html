<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ISOmon Go</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="game">

<h1>ISOmon Go</h1>

<div id="dialogue"></div>

<div id="battle">

<div class="enemy">
<h2>ISOku</h2>
<div class="hp">
<div id="enemyHP"></div>
</div>
<img id="enemySprite" src="assets/isoku.png">
</div>

<div class="player">
<h2 id="playerName">RSSIlet</h2>
<div class="hp">
<div id="playerHP"></div>
</div>
<img id="playerSprite" src="assets/rssilet.png">
</div>

</div>

<div id="questionBox">

<div id="timer">40</div>

<div id="question"></div>

<div id="answers"></div>

</div>

<button id="startBtn">Start Game</button>

</div>

<script src="game.js"></script>

</body>

</html>
