<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISOMon GO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">
  <div class="gamebox">

    <div class="title">
      ISOMon - GO : gagnez l'ISO 27001 !
    </div>

    <div class="status-bar">
      <div id="round">Round 1</div>
      <div id="timer">⏱️ 40</div>
    </div>

    <div class="battle-zone" id="battle-zone">

      <div class="enemy-container">
        <img id="enemy-img" src="assets/isoku.png" class="pokemon-img">
        <div class="hp-label">PV</div>
        <progress id="enemy-hp-bar" value="100" max="100"></progress>
        <div id="enemy-hp">100</div>
      </div>

      <div class="player-container">
        <img id="player-img" src="assets/rssilet_back.png" class="pokemon-img">
        <img id="trainer-img" src="assets/trainer.png" class="trainer-img">
        <div class="hp-label">PV</div>
        <progress id="player-hp-bar" value="100" max="100"></progress>
        <div id="player-hp">100</div>
      </div>

    </div>

    <div id="evolution-text" class="evolution-text">
      🎮 Capture ISOKu en 3 rounds.<br>
      5 bonnes réponses minimum pour passer !
    </div>

    <div class="question-container">
      <div id="question" class="question-text"></div>
      <div id="answers" class="answers-grid"></div>
      <div id="explanation" class="explanation"></div>
    </div>

    <div class="buttons">
      <button id="start-btn">Démarrer</button>
      <button id="restart-btn" class="hidden">Rejouer</button>
    </div>

    <div id="projectile-container"></div>

  </div>
</div>

<script src="game.js"></script>
</body>
</html>
