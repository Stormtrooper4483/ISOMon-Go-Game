<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>ISOMon GO</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="start-screen">
  <h1>ISOMon-GO</h1>
  <p>
    Bienvenue sur ISOMon-GO !<br>
    Réponds correctement aux questions pour attraper le pokémon ISOku.<br>
    Tu as 40 secondes par question.<br>
    Survis aux 3 rounds et gagne ta certification ISO27001 !
  </p>
  <button onclick="startGame()">Démarrer</button>
</div>

<div id="game" class="hidden">

  <div class="battle">

    <!-- ENNEMI -->
    <div class="enemy">
      <div class="name">ISOku</div>
      <div class="hp">PV: <span id="enemy-hp">100</span></div>
      <img id="enemy-img" src="assets/isoku.png">
    </div>

    <!-- JOUEUR -->
    <div class="player">
      <img class="trainer" src="assets/trainer.png">
      <img id="player-img" src="assets/rssilet_back.png">
    </div>

  </div>

  <!-- UI GAMEBOY -->
  <div id="ui-box">
    <div id="round">Round 1</div>
    <div id="timer">⏱️ 40</div>
    <div id="question"></div>
    <div id="answers"></div>
    <div id="evolution-text"></div>
  </div>

  <button onclick="restartGame()">Rejouer</button>

</div>

<script src="game.js"></script>
</body>
</html>
