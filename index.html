<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISOMon GO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">
  <div class="gamebox" id="capture-area">

    <div class="title">ISOMon - GO : gagnez l'ISO 27001 !</div>

    <div class="status-bar">
      <div id="round">Round 1</div>
      <div id="timer">⏱️ 40</div>
    </div>

    <div class="round-info">Objectif : 5/6 bonnes réponses</div>

    <div class="battle-zone" id="battle-zone">

      <div class="enemy-container">
        <img id="enemy-img" src="assets/isoku.png" class="pokemon-img">
        <div class="hp-label">PV</div>
        <progress id="enemy-hp-bar" value="100" max="100"></progress>
        <div id="enemy-hp">100</div>
      </div>

      <div class="player-container">
        <img id="player-img" src="assets/rssilet_back.png" class="pokemon-img">
        <img src="assets/trainer.png" class="trainer-img">
        <div class="hp-label">PV</div>
        <progress id="player-hp-bar" value="100" max="100"></progress>
        <div id="player-hp">100</div>
      </div>

    </div>

    <div id="evolution-text" class="evolution-text">
      🎮 Capture ISOKu en 3 rounds
    </div>

    <div class="question-container">
      <div id="question"></div>
      <div id="answers"></div>
      <div id="explanation"></div>
    </div>

    <div class="buttons">
      <button id="start-btn">Démarrer</button>
      <button id="restart-btn" class="hidden">Rejouer</button>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" class="hidden result-screen">
      <h2>🎯 Certification ISO 27001 obtenue !</h2>
      <div class="badge">🛡️ ISO CERTIFIED 🛡️</div>
      <div id="final-score" class="score"></div>
      <button onclick="downloadImage()">📸 Télécharger mon score</button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="game.js"></script>
</body>
</html>
