<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISOMon-GO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">

    <!-- Encart style GameBoy -->
    <div class="gamebox">

      <!-- Round et timer -->
      <div class="status-bar">
        <div id="round">Round 1</div>
        <div id="timer">⏱️ 40</div>
      </div>

      <!-- Zone Pokémon -->
      <div class="battle-zone">
        <div class="enemy-container">
          <img id="enemy-img" src="assets/isoku.png" alt="ISOku" class="pokemon-img">
          <progress id="enemy-hp-bar" value="100" max="100"></progress>
          <div id="enemy-hp">100</div>
        </div>

        <div class="player-container">
          <img id="player-img" src="assets/rssilet_back.png" alt="Player" class="pokemon-img">
          <img id="trainer-img" src="assets/trainer.png" alt="Trainer" class="trainer-img">
          <progress id="player-hp-bar" value="100" max="100"></progress>
          <div id="player-hp">100</div>
        </div>
      </div>

      <!-- Texte d'évolution / intro -->
      <div id="evolution-text" class="evolution-text">
        Bienvenu sur ISOMon-GO ! Réponds correctement aux questions pour attraper le pokémon ISOku<br>
        Tu as 40 secondes par question. Survis aux 3 rounds et gagne ta certification ISO27001 !
      </div>

      <!-- Question et réponses -->
      <div class="question-container">
        <div id="question" class="question-text"></div>
        <div id="answers" class="answers-grid"></div>
      </div>

      <!-- Boutons -->
      <div class="buttons">
        <button id="start-btn">Démarrer</button>
        <button id="restart-btn" class="hidden">Rejouer</button>
      </div>

      <!-- Container pour sprites d'attaque -->
      <div id="projectile-container"></div>

    </div>
  </div>

  <!-- Script -->
  <script src="game.js"></script>
</body>
</html>
