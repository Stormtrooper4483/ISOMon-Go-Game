<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ISOMon</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="game">

  <div id="battle">

    <div class="enemy">
      <div id="enemy-name"></div>
      <div class="hp-bar"><div id="enemy-hp"></div></div>
      <img id="enemy-sprite" />
    </div>

    <div class="player">
      <img id="trainer" />
      <img id="player-sprite" />
      <div id="player-name"></div>
      <div class="hp-bar"><div id="player-hp"></div></div>
    </div>

    <div class="dialog">
      <p id="question"></p>
      <div id="answers"></div>
      <p id="feedback"></p>
      <div id="timer"></div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
