<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISOMon</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game">

  <div class="enemy">
    <div id="enemy-name">ISOKu</div>
    <div class="hp-bar"><div id="enemy-hp"></div></div>
    <img id="enemy-sprite" src="sprites/isoku.png">
  </div>

  <div class="player">
    <img id="trainer" src="sprites/trainer.png">
    <img id="player-sprite" src="sprites/rssilet_back.png">
    <div id="player-name">RSSIlet</div>
    <div class="hp-bar"><div id="player-hp"></div></div>
  </div>

  <div id="battle-text"></div>

  <div class="dialog">
    <p id="question"></p>
    <div id="answers"></div>
    <div id="timer"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
